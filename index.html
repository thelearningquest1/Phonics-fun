<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phonics Fun</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#FEF6FF;min-height:100vh;padding:14px;display:flex;justify-content:center}
#root{width:100%;max-width:520px}
.card{background:#fff;border-radius:20px;padding:22px;box-shadow:0 3px 18px rgba(168,85,247,.1);margin-bottom:12px}
.pbar{height:10px;background:#E9D5FF;border-radius:10px;overflow:hidden;margin:8px 0}
.pbar-fill{height:100%;background:linear-gradient(90deg,#A855F7,#EC4899);border-radius:10px;transition:width .4s}
.btn{background:linear-gradient(135deg,#A855F7,#EC4899);color:#fff;border:none;border-radius:12px;padding:11px 22px;font-size:15px;font-weight:700;cursor:pointer}
.btn-s{background:#F3E8FF;color:#7C3AED;border:2px solid #C084FC;border-radius:12px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer}
.btn-red{background:#FEE2E2;color:#DC2626;border:2px solid #FCA5A5;border-radius:12px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer}
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.badge{border-radius:8px;padding:4px 10px;font-weight:700;font-size:13px}
.input-field{border:2px solid #C084FC;border-radius:12px;padding:11px 14px;font-size:16px;width:100%;outline:none;background:#FAF5FF;margin-top:6px}
.input-field:focus{border-color:#A855F7}
.player-chip{display:flex;align-items:center;justify-content:space-between;background:#FAF5FF;border:2px solid #E9D5FF;border-radius:12px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.player-chip:hover{border-color:#C084FC;background:#F3E8FF}
.player-chip.active{border-color:#A855F7;background:#F3E8FF}
</style>
</head>
<body>
<div id="root"></div>
<script>
var ALL="bat ten pig cot bug fan mat hen wig dot hug van cat pen dig pot rug can hat den fig rot mug ran sat men big hot dug man jet dip log bun bag bed net hip hog fun rag red pet lip dog nun tag fed wet zip fog sun wag led vet rip cog run nag wed pin cub cab bid cob hum win tub tab lid sob bum fin rub nab rid rob sum tin sub jab hid job gum bin hub dab kid mob rum ham bad bit cop cap but dam sad kit hop zap nut yam dad pit mop map rut jam mad hit top tap cut ram wad sit pop lap gut".split(" ");
var GROUPS=[];for(var i=0;i<12;i++)GROUPS.push(ALL.slice(i*10,i*10+10));
var STICKERS=[
  {e:"🌟",n:"Superstar",m:"You're a Superstar!"},
  {e:"🏆",n:"Champion",m:"You're a Champion!"},
  {e:"🦋",n:"Brilliant",m:"Brilliant Work!"},
  {e:"🌈",n:"Amazing",m:"You're Amazing!"},
  {e:"🎉",n:"Fantastic",m:"Fantastic Job!"},
  {e:"💎",n:"Star Reader",m:"Star Reader!"},
  {e:"🌸",n:"Well Done",m:"Well Done!"},
  {e:"🦄",n:"Magic Speller",m:"Magic Speller!"},
  {e:"🚀",n:"Rocket Reader",m:"Rocket Reader!"},
  {e:"👑",n:"Word Queen",m:"Word Queen!"},
  {e:"🎀",n:"Top of Class",m:"Top of the Class!"},
  {e:"🌺",n:"Spelling Hero",m:"Spelling Hero!"}
];

// ── PLAYER STORAGE ────────────────────────────────────────────
var currentPlayer = null;

function getPlayers(){
  try{return JSON.parse(localStorage.getItem("pf_players")||"[]");}catch(e){return[];}
}
function savePlayers(players){
  try{localStorage.setItem("pf_players",JSON.stringify(players));}catch(e){}
}
function getPlayerData(name){
  var players=getPlayers();
  var p=players.find(function(x){return x.name===name});
  if(!p) return {name:name,done:Array(12).fill(false),earned:Array(12).fill(false),totalStars:0};
  return p;
}
function savePlayerData(data){
  var players=getPlayers();
  var idx=players.findIndex(function(x){return x.name===data.name});
  if(idx>=0) players[idx]=data; else players.push(data);
  savePlayers(players);
}
function deletePlayer(name){
  var players=getPlayers().filter(function(x){return x.name!==name});
  savePlayers(players);
}

// ── GAME STATE ────────────────────────────────────────────────
var S={
  screen:"players",gi:0,
  done:Array(12).fill(false),earned:Array(12).fill(false),
  learnIdx:0,seen:Array(10).fill(0),
  testQ:[],testIdx:0,testMode:0,
  score:0,streak:0,best:0,results:[],
  slots:[],usedT:[],letters:[],totalStars:0
};

function sh(a){return[...a].sort(()=>Math.random()-.5)}
function say(w){try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(w);u.lang="en-GB";u.rate=.8;u.pitch=1.1;speechSynthesis.speak(u);}catch(e){}}
function ph(w){return w.split("").join(" · ")}
function $(id){return document.getElementById(id)}
function render(html){$("root").innerHTML=html}
function pbar(pct){return'<div class="pbar"><div class="pbar-fill" style="width:'+pct+'%"></div></div>'}

function loadPlayer(name){
  var d=getPlayerData(name);
  currentPlayer=name;
  S.done=d.done||Array(12).fill(false);
  S.earned=d.earned||Array(12).fill(false);
  S.totalStars=d.totalStars||0;
}
function persistProgress(){
  if(!currentPlayer) return;
  savePlayerData({name:currentPlayer,done:S.done,earned:S.earned,totalStars:S.totalStars});
}

// ── PLAYER SELECT SCREEN ──────────────────────────────────────
function showPlayers(){
  S.screen="players";
  var players=getPlayers();
  var chips=players.length===0
    ? '<p style="color:#9CA3AF;font-size:13px;text-align:center;padding:10px 0">No players yet — add one below!</p>'
    : players.map(function(p){
        var cnt=p.earned.filter(Boolean).length;
        var lastGroup=p.done.lastIndexOf(true);
        var progress=lastGroup>=0?"Group "+(lastGroup+1)+" done":"Just starting";
        return'<div class="player-chip" onclick="loginPlayer(\''+encodeURIComponent(p.name)+'\')">'+
          '<div>'+
          '<div style="font-weight:700;color:#7C3AED;font-size:16px">'+p.name+'</div>'+
          '<div style="font-size:12px;color:#9CA3AF;margin-top:2px">'+progress+' · '+cnt+' sticker'+(cnt!==1?"s":"")+'</div></div>'+
          '<div style="display:flex;align-items:center;gap:8px">'+
          '<span style="font-size:20px">'+
          (cnt>0?p.earned.map(function(e,i){return e?STICKERS[i].e:""}).filter(Boolean).slice(-2).join(""):"✨")+
          '</span>'+
          '<button onclick="event.stopPropagation();confirmDelete(\''+encodeURIComponent(p.name)+'\')" style="background:#FEE2E2;color:#DC2626;border:none;border-radius:8px;padding:4px 8px;font-size:11px;cursor:pointer">✕</button>'+
          '</div></div>';
      }).join("");

  render(
    '<div style="text-align:center;padding:8px 0 14px">'+
    '<div style="font-size:44px">📚</div>'+
    '<div style="font-size:28px;font-weight:800;color:#A855F7">Phonics Fun</div>'+
    '<div style="color:#9CA3AF;font-size:13px;margin-top:2px">Who\'s playing today?</div></div>'+
    '<div class="card">'+
    '<p style="font-weight:700;color:#7C3AED;margin-bottom:12px">👤 Choose a player:</p>'+
    chips+
    '<div style="margin-top:14px;padding-top:14px;border-top:1px solid #F3E8FF">'+
    '<p style="font-weight:600;color:#7C3AED;font-size:14px;margin-bottom:6px">➕ New player:</p>'+
    '<input class="input-field" id="newName" placeholder="Enter your name…" maxlength="20" onkeydown="if(event.key===\'Enter\')addPlayer()">'+
    '<button class="btn" onclick="addPlayer()" style="width:100%;margin-top:10px">Start Playing! 🚀</button>'+
    '</div></div>'
  );
  var inp=$("newName"); if(inp) setTimeout(function(){inp.focus();},100);
}

function addPlayer(){
  var inp=$("newName"); if(!inp)return;
  var name=inp.value.trim();
  if(!name){inp.style.borderColor="#DC2626";return;}
  if(name.length<1){return;}
  loginPlayer(encodeURIComponent(name));
}

function loginPlayer(encName){
  var name=decodeURIComponent(encName);
  loadPlayer(name);
  showHome();
}

function confirmDelete(encName){
  var name=decodeURIComponent(encName);
  if(confirm("Delete player \""+name+"\"? This will remove all their progress.")){
    deletePlayer(name);
    if(currentPlayer===name){currentPlayer=null;}
    showPlayers();
  }
}

// ── HOME ──────────────────────────────────────────────────────
function showHome(){
  S.screen="home";
  var tiles=GROUPS.map(function(g,i){
    var done=S.done[i],un=i===0||S.done[i-1];
    var bg=done?"#F0FDF4":un?"#FAF5FF":"#F9FAFB";
    var border=done?"2px solid #86EFAC":un?"2px solid #C084FC":"2px solid #E5E7EB";
    var st=done?"✓ Done":un?"▶ Play":"🔒";
    var sc=done?"#16A34A":un?"#A855F7":"#9CA3AF";
    return'<div onclick="selGroup('+i+')" style="background:'+bg+';border:'+border+';border-radius:14px;padding:10px 6px;text-align:center;cursor:'+(un?"pointer":"not-allowed")+';opacity:'+(un?1:.55)+'">'+
      '<div style="font-size:16px;font-weight:800;color:#7C3AED">'+(i+1)+'</div>'+
      '<div style="font-size:10px;color:#9CA3AF;margin:2px 0">'+g[0]+'…</div>'+
      '<div style="font-size:11px;font-weight:700;color:'+sc+'">'+st+'</div></div>';
  }).join("");
  var cnt=S.earned.filter(Boolean).length;
  var pct=Math.round(cnt/12*100);
  var stSlots=S.earned.map(function(e,i){
    return'<div title="'+(e?STICKERS[i].n:"Locked")+'" style="width:46px;height:46px;border-radius:11px;border:'+(e?"2px solid #C084FC":"2px dashed #E5E7EB")+';background:'+(e?"#FAF5FF":"#F9FAFB")+';display:flex;align-items:center;justify-content:center;font-size:'+(e?24:13)+'px">'+(e?STICKERS[i].e:"?")+'</div>';
  }).join("");

  render(
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
    '<button class="btn-s" onclick="showPlayers()" style="padding:6px 12px;font-size:12px">← Players</button>'+
    '<div style="font-weight:700;color:#A855F7;font-size:15px">👤 '+currentPlayer+'</div>'+
    '<div style="background:#F3E8FF;color:#7C3AED;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700">'+cnt+' ⭐</div>'+
    '</div>'+
    '<div style="text-align:center;padding:4px 0 12px">'+
    '<div style="font-size:40px">📚</div>'+
    '<div style="font-size:24px;font-weight:800;color:#A855F7">Phonics Fun</div></div>'+
    '<div class="card">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'+
    '<p style="font-weight:700;color:#7C3AED">Word Groups</p>'+
    '<span style="font-size:12px;color:#9CA3AF">'+cnt+'/12 complete</span></div>'+
    pbar(pct)+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px">'+tiles+'</div></div>'+
    '<div class="card">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
    '<span style="font-weight:700;color:#7C3AED">✨ Sticker Book</span>'+
    '<button class="btn-s" onclick="showBook()" style="padding:5px 12px;font-size:12px">View all →</button></div>'+
    '<div style="display:flex;gap:6px;flex-wrap:wrap">'+stSlots+'</div></div>'
  );
}

function selGroup(i){
  if(i>0&&!S.done[i-1])return;
  S.gi=i;S.learnIdx=0;S.seen=Array(10).fill(0);
  showLearn();
}

// ── LEARN ─────────────────────────────────────────────────────
function showLearn(){
  S.screen="learn";
  var g=GROUPS[S.gi],w=g[S.learnIdx];
  var allSeen=S.seen.every(function(c){return c>=2});
  var dots=g.map(function(_,i){
    return'<div style="width:10px;height:10px;border-radius:50%;background:'+(S.seen[i]>=2?"#A855F7":"#E9D5FF")+'"></div>';
  }).join("");
  render(
    '<div class="topbar">'+
    '<button class="btn-s" onclick="showHome()" style="padding:5px 12px;font-size:12px">← Home</button>'+
    '<div style="flex:1;font-weight:700;color:#7C3AED;text-align:center;font-size:14px">Group '+(S.gi+1)+' — Learn ('+currentPlayer+')</div></div>'+
    '<div class="card">'+
    '<div style="font-size:12px;color:#9CA3AF;text-align:center;margin-bottom:4px">Word '+(S.learnIdx+1)+' of '+g.length+'</div>'+
    pbar(Math.round(S.learnIdx/g.length*100))+
    '<div style="background:linear-gradient(135deg,#FAF5FF,#FDF2F8);border:2px solid #E9D5FF;border-radius:18px;padding:28px;margin:14px 0;text-align:center">'+
    '<div style="font-size:52px;font-weight:800;color:#7C3AED;letter-spacing:4px;margin-bottom:6px">'+w+'</div>'+
    '<div style="font-size:16px;color:#C084FC;letter-spacing:5px;font-weight:600;margin-bottom:12px">'+ph(w)+'</div>'+
    '<button onclick="say(\''+w+'\')" style="background:#FDF4FF;border:2px solid #E879F9;border-radius:10px;padding:7px 18px;font-size:14px;font-weight:700;color:#A21CAF;cursor:pointer">🔊 Hear it</button>'+
    '<div style="font-size:12px;color:#C084FC;margin-top:8px">Seen '+S.seen[S.learnIdx]+' time'+(S.seen[S.learnIdx]!==1?"s":"")+'</div></div>'+
    '<div style="display:flex;gap:6px;justify-content:center;margin-bottom:12px">'+dots+'</div>'+
    '<div style="display:flex;gap:10px;justify-content:center">'+
    '<button class="btn-s" onclick="learnAgain()">🔁 Again</button>'+
    '<button class="btn" onclick="learnNext()">Got it! →</button></div>'+
    (allSeen?'<button class="btn" onclick="startTest()" style="width:100%;margin-top:12px;background:linear-gradient(135deg,#16A34A,#15803D)">✅ Ready — Take the Test!</button>':'')+
    '</div>'
  );
  say(w);
}

function learnNext(){
  var g=GROUPS[S.gi];
  S.seen[S.learnIdx]=Math.max(S.seen[S.learnIdx],1)+1;
  S.learnIdx=(S.learnIdx+1)%g.length;
  showLearn();
}
function learnAgain(){
  S.seen[S.learnIdx]++;
  var g=GROUPS[S.gi];
  var unseen=g.findIndex(function(_,i){return S.seen[i]<2});
  S.learnIdx=unseen!==-1?unseen:(S.learnIdx+1)%g.length;
  showLearn();
}

// ── TEST ──────────────────────────────────────────────────────
function startTest(){
  S.testQ=sh(GROUPS[S.gi]);S.testIdx=0;S.testMode=0;
  S.score=0;S.streak=0;S.best=0;S.results=[];
  showTest();
}
function showTest(){
  S.screen="test";
  var w=S.testQ[S.testIdx],total=S.testQ.length;
  var pct=Math.round(S.testIdx/total*100);
  var mnames=["👂 Hear & Pick","🔤 Spell It","⌨️ Type It"];
  var inner=S.testMode===0?renderHP(w):S.testMode===1?renderSP(w):renderTY(w);
  render(
    '<div class="topbar">'+
    '<button class="btn-s" onclick="showHome()" style="padding:5px 12px;font-size:12px">← Home</button>'+
    '<div style="flex:1;height:10px;background:#E9D5FF;border-radius:10px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#A855F7,#EC4899);border-radius:10px;transition:width .4s"></div></div>'+
    '<div class="badge" style="background:#F3E8FF;color:#7C3AED">⭐ '+S.score+'</div>'+
    '<div class="badge" style="background:#FEF3C7;color:#D97706">🔥 '+S.streak+'</div></div>'+
    '<div class="card" id="gc">'+
    '<div style="font-size:11px;font-weight:700;letter-spacing:1px;color:#9CA3AF;text-align:center;margin-bottom:4px">'+mnames[S.testMode]+' — Group '+(S.gi+1)+'</div>'+
    '<div style="font-size:11px;color:#9CA3AF;text-align:center;margin-bottom:6px">Word '+(S.testIdx+1)+' of '+total+'</div>'+
    pbar(pct)+inner+'</div>'
  );
  if(S.testMode===0)say(w);
  if(S.testMode===1)setupSP(w);
  if(S.testMode===2)setupTY(w);
}

function renderHP(w){
  var opts=sh([w].concat(sh(ALL.filter(function(x){return x!==w})).slice(0,3)));
  return'<div style="text-align:center;margin-top:10px">'+
    '<button onclick="say(\''+w+'\')" style="background:#FDF4FF;border:2px solid #E879F9;border-radius:10px;padding:7px 18px;font-size:13px;font-weight:700;color:#A21CAF;cursor:pointer;margin-bottom:10px">🔊 Hear the word</button>'+
    '<div style="color:#C084FC;font-size:13px;letter-spacing:3px;margin-bottom:12px">'+ph(w)+'</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
    opts.map(function(o){return'<button id="cb_'+o+'" onclick="chkHP(\''+o+'\',\''+w+'\')" style="background:#FAF5FF;border:2px solid #E9D5FF;border-radius:12px;padding:15px 8px;font-size:24px;font-weight:700;cursor:pointer;letter-spacing:2px">'+o+'</button>';}).join("")+
    '</div></div>';
}
function chkHP(chosen,word){
  document.querySelectorAll("[id^='cb_']").forEach(function(b){b.onclick=null});
  var ok=chosen===word;
  var el=$("cb_"+chosen);
  if(el){el.style.background=ok?"#DCFCE7":"#FEE2E2";el.style.borderColor=ok?"#16A34A":"#DC2626";el.style.color=ok?"#16A34A":"#DC2626";}
  if(!ok){var el2=$("cb_"+word);if(el2){el2.style.background="#DCFCE7";el2.style.borderColor="#16A34A";el2.style.color="#16A34A";}}
  handleResult(ok,word);
}

function renderSP(w){
  return'<div style="text-align:center;margin-top:10px">'+
    '<div style="color:#C084FC;font-size:13px;letter-spacing:3px;margin-bottom:10px">'+ph(w)+'</div>'+
    '<div id="slots" style="display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap"></div>'+
    '<div id="bank" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"></div>'+
    '<p style="color:#C084FC;font-size:11px;margin-top:8px">Tap a slot to remove a letter</p></div>';
}
function setupSP(w){
  S.slots=Array(w.length).fill(null);
  S.letters=sh(w.split(""));S.usedT=Array(w.length).fill(false);
  var sl=$("slots"),bk=$("bank");if(!sl)return;
  sl.innerHTML=w.split("").map(function(_,i){return'<div id="sl'+i+'" onclick="clrSlot('+i+',\''+w+'\')" style="width:50px;height:56px;border:2.5px dashed #C084FC;border-radius:10px;background:#FAF5FF;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#7C3AED;cursor:pointer"></div>';}).join("");
  bk.innerHTML=S.letters.map(function(l,i){return'<button id="lt'+i+'" onclick="placeLtr('+i+',\''+w+'\')" style="width:48px;height:48px;background:linear-gradient(135deg,#A855F7,#EC4899);color:#fff;border:none;border-radius:10px;font-size:22px;font-weight:700;cursor:pointer">'+l+'</button>';}).join("");
}
function placeLtr(ti,word){
  if(S.usedT[ti])return;
  var si=S.slots.indexOf(null);if(si===-1)return;
  S.slots[si]={l:S.letters[ti],ti:ti};S.usedT[ti]=true;
  var sl=$("sl"+si);if(sl){sl.textContent=S.letters[ti];sl.style.borderStyle="solid";sl.style.borderColor="#A855F7";sl.style.background="#F3E8FF";}
  var lt=$("lt"+ti);if(lt){lt.disabled=true;lt.style.background="#E5E7EB";lt.style.color="#9CA3AF";}
  if(S.slots.indexOf(null)===-1){
    var guess=S.slots.map(function(s){return s.l}).join("");
    var ok=guess===word;
    S.slots.forEach(function(_,i){var s=$("sl"+i);if(s){s.style.borderColor=ok?"#16A34A":"#DC2626";s.style.background=ok?"#DCFCE7":"#FEE2E2";s.style.color=ok?"#16A34A":"#DC2626";}});
    document.querySelectorAll("[id^='lt']").forEach(function(b){b.disabled=true;});
    handleResult(ok,word);
  }
}
function clrSlot(i,word){
  if(!S.slots[i])return;
  var ti=S.slots[i].ti;S.usedT[ti]=false;S.slots[i]=null;
  var sl=$("sl"+i);if(sl){sl.textContent="";sl.style.borderStyle="dashed";sl.style.borderColor="#C084FC";sl.style.background="#FAF5FF";}
  var lt=$("lt"+ti);if(lt){lt.disabled=false;lt.style.background="linear-gradient(135deg,#A855F7,#EC4899)";lt.style.color="#fff";}
}

function renderTY(w){
  return'<div style="text-align:center;margin-top:10px">'+
    '<div id="fw" style="font-size:46px;font-weight:800;color:#A855F7;letter-spacing:5px;margin:8px 0;min-height:60px;transition:opacity 1s">'+w+'</div>'+
    '<p style="color:#9CA3AF;font-size:12px;margin-bottom:10px">Remember it — it will disappear!</p>'+
    '<input id="ti" maxlength="6" placeholder="type here…" autocomplete="off" autocorrect="off" spellcheck="false" style="border:2.5px solid #C084FC;border-radius:12px;padding:11px;font-size:26px;font-weight:700;text-align:center;width:170px;letter-spacing:4px;outline:none;display:block;margin:8px auto;background:#FAF5FF">'+
    '<button onclick="chkType(\''+w+'\')" style="background:linear-gradient(135deg,#A855F7,#EC4899);color:#fff;border:none;border-radius:10px;padding:9px 26px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px">Check ✓</button></div>';
}
function setupTY(w){
  var fw=$("fw"),ti=$("ti");if(!ti)return;
  ti.oninput=function(){ti.value=ti.value.toLowerCase().replace(/[^a-z]/g,"")};
  ti.onkeydown=function(e){if(e.key==="Enter")chkType(w)};
  setTimeout(function(){if(fw)fw.style.opacity="0";},2200);
}
function chkType(word){
  var ti=$("ti");if(!ti||ti.disabled)return;
  ti.disabled=true;
  var ok=ti.value.trim()===word;
  ti.style.borderColor=ok?"#16A34A":"#DC2626";ti.style.background=ok?"#DCFCE7":"#FEE2E2";
  var fw=$("fw");if(fw)fw.style.opacity="1";
  handleResult(ok,word);
}

function handleResult(ok,word){
  var bonus=ok&&S.streak>=3?5:0;
  if(ok){S.score+=10+bonus;S.streak++;if(S.streak>S.best)S.best=S.streak;say(word);}
  else S.streak=0;
  S.results.push({w:word,ok:ok});
  var gc=$("gc");if(!gc)return;
  var pts=ok?10+bonus:0;
  var isLast=S.testIdx+1>=S.testQ.length&&S.testMode>=2;
  gc.innerHTML+='<div style="text-align:center;padding:16px 0;border-top:1px solid #F3E8FF;margin-top:12px">'+
    '<div style="font-size:52px;margin-bottom:6px">'+(ok?"🌟":"💪")+'</div>'+
    '<div style="font-size:19px;font-weight:700;color:'+(ok?"#16A34A":"#DC2626")+';margin-bottom:4px">'+
    (ok?(S.streak>=5?"🔥 On fire!":S.streak>=3?"⭐ Great!":"✅ Correct!"):"The word was:")+'</div>'+
    (ok?'<div style="color:#A855F7;font-weight:700;font-size:14px;margin-bottom:4px">+'+pts+' points</div>':'')+
    '<div style="font-size:32px;font-weight:800;letter-spacing:4px;color:#7C3AED;margin-bottom:14px">'+word+'</div>'+
    '<button class="btn" onclick="nextTest()">'+(isLast?"See Results! 🎉":"Next →")+'</button></div>';
}
function nextTest(){
  S.testIdx++;
  if(S.testIdx>=S.testQ.length){
    if(S.testMode<2){S.testMode++;S.testIdx=0;S.testQ=sh(GROUPS[S.gi]);showTest();}
    else endTest();
  } else showTest();
}

function endTest(){
  var g=GROUPS[S.gi];
  var good=S.results.filter(function(r){return r.ok}).length;
  var total=S.results.length;
  var pct=Math.round(good/total*100);
  if(pct>=60){
    S.done[S.gi]=true;S.earned[S.gi]=true;S.totalStars++;
    persistProgress();
    showAward();
  } else {
    var chips=g.map(function(w){
      var r=S.results.filter(function(x){return x.w===w});
      var ok=r.length&&r[r.length-1].ok;
      return'<span style="background:'+(ok?"#DCFCE7":"#FEE2E2")+';color:'+(ok?"#16A34A":"#DC2626")+';border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600">'+(ok?"✓":"✗")+' '+w+'</span>';
    }).join("");
    render('<div class="card" style="text-align:center">'+
      '<div style="font-size:44px;margin-bottom:8px">💪</div>'+
      '<h2 style="color:#A855F7;margin-bottom:6px">Keep practising!</h2>'+
      '<p style="color:#9CA3AF;font-size:14px;margin-bottom:14px">You got '+good+'/'+total+' — need 60% to earn your sticker. You can do it!</p>'+
      '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:18px">'+chips+'</div>'+
      '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'+
      '<button class="btn-s" onclick="selGroup('+S.gi+')">🔁 Practise again</button>'+
      '<button class="btn" onclick="startTest()">Try Test Again</button></div></div>');
  }
}

function showAward(){
  var s=STICKERS[S.gi];
  render('<div class="card" style="text-align:center;padding:28px">'+
    '<p style="color:#9CA3AF;font-size:14px;margin-bottom:10px">Group '+(S.gi+1)+' Complete — '+currentPlayer+'! 🎉</p>'+
    '<div style="font-size:90px;margin:10px 0">'+s.e+'</div>'+
    '<div style="font-size:22px;font-weight:800;color:#7C3AED;margin:8px 0 4px">'+s.m+'</div>'+
    '<div style="font-size:14px;color:#9CA3AF;margin-bottom:20px">You earned the <strong>'+s.n+'</strong> sticker!</div>'+
    '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'+
    '<button class="btn-s" onclick="showBook()">📖 Sticker Book</button>'+
    (S.gi+1<12?'<button class="btn" onclick="selGroup('+(S.gi+1)+')">Next Group →</button>':'')+
    '<button class="btn-s" onclick="showHome()">🏠 Home</button></div></div>');
}

function showBook(){
  var cnt=S.earned.filter(Boolean).length;
  var items=STICKERS.map(function(s,i){
    var e=S.earned[i];
    return'<div style="border-radius:16px;padding:14px 8px;text-align:center;border:'+(e?"2px solid #C084FC":"2px solid #E9D5FF")+';background:'+(e?"#FAF5FF":"#F9FAFB")+';opacity:'+(e?1:.45)+'">'+
      '<div style="font-size:38px;margin-bottom:4px">'+(e?s.e:"❓")+'</div>'+
      '<div style="font-size:11px;font-weight:700;color:#7C3AED">'+(e?s.n:"???")+'</div>'+
      '<div style="font-size:10px;color:#9CA3AF">Group '+(i+1)+'</div></div>';
  }).join("");
  render('<div class="topbar">'+
    '<button class="btn-s" onclick="showHome()" style="padding:5px 12px;font-size:12px">← Home</button>'+
    '<div style="flex:1;font-weight:700;color:#7C3AED;text-align:center">✨ '+currentPlayer+'\'s Stickers</div></div>'+
    '<div class="card">'+
    '<p style="text-align:center;color:#7C3AED;font-weight:700;margin-bottom:4px">'+cnt+' of 12 stickers collected</p>'+
    '<div class="pbar"><div class="pbar-fill" style="width:'+Math.round(cnt/12*100)+'%"></div></div>'+
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px">'+items+'</div></div>');
}

showPlayers();
</script>
</body>
</html>
